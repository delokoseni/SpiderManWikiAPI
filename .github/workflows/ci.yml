name: Java CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Oracle JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '21'
          cache: maven

      - name: Build project
        run: mvn clean package --batch-mode --quiet

      - name: Run tests
        run: mvn test --batch-mode --quiet

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: spiderman-api
          path: target/*.jar